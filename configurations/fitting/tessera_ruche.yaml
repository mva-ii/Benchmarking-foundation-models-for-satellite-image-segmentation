# lightning.pytorch==2.6.1
seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: 4
  num_nodes: 1
  precision: null
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: benchmark-fm-models-remote-sensing
      name: tessera_ruche_train_h512_h256_lr0.001
      log_model: true
      checkpoint_name: ${trainer.logger.init_args.name}
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        filename: "best-{epoch:02d}-{val_mIoU:.4f}"
        monitor: "val/mIoU"
        mode: "max"
        save_top_k: 1
        save_last: true
  fast_dev_run: false
  max_epochs: 200
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: null # validating is really slow so we do it less often
  num_sanity_val_steps: null
  log_every_n_steps: 1
  enable_checkpointing: null
  enable_progress_bar: true
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  enable_autolog_hparams: true
  model_registry: null
model:
  class_path: fm_benchmark_remote_sensing.models.SegmentationMLPModule
  init_args:
    head_cfg:
      in_dim: 128
      hidden_dim_1: 512
      hidden_dim_2: 256
      num_classes: 18
    remap_to_ignore_index: 18

data:
  class_path: fm_benchmark_remote_sensing.data.EmbeddingDataModule
  init_args:
    pastis_r_root: null
    embedding_type: tessera
    embedding_root: null
    batch_size: 32
    num_workers: 4
    pin_memory: true
    val_fold: 4
    test_fold: 5

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001
lr_scheduler: null
weights_only: null
#download_path: data
#dataset_artifact_reference: benchmark-fm-models-remote-sensing/dataset-pastis-r-embeddings:latest
checkpoint_reference: null
